<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Color pallet generator</>

            <select name="" id="format">

            <button id="generate">generate</button>
        </div>
    </div>
    <div id="palette">  </div>
    <script src="script.js" />
</body>
</html>
